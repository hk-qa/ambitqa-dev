<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AmbitQA Evaluator</title>
<style>
  /* ── Design tokens — dark mode (default) ────────────────── */
  :root {
    --bg:        #0f1117;
    --surface:   #181c27;
    --surface2:  #1e2333;
    --border:    #2a3050;
    --border2:   #3a4468;
    --text:      #e8eaf0;
    --text2:     #a8aec4;
    --text3:     #7b82a0;
    --accent:    #6c63ff;
    --accent2:   #8b83ff;
    --pass:      #22c55e;
    --warn:      #f59e0b;
    --fail:      #ef4444;
    --pass-bg:   rgba(34,197,94,.10);
    --warn-bg:   rgba(245,158,11,.10);
    --fail-bg:   rgba(239,68,68,.10);
    --radius:    10px;
    --radius-sm: 6px;
  }

  /* ── Light mode ───────────────────────────────────────────── */
  [data-theme="light"] {
    --bg:        #f4f5f7;
    --surface:   #ffffff;
    --surface2:  #f0f1f5;
    --border:    #dde0ea;
    --border2:   #c4c9d8;
    --text:      #111827;
    --text2:     #374151;
    --text3:     #4b5563;
    --accent:    #5b53f0;
    --accent2:   #7c75f5;
    --pass:      #16a34a;
    --warn:      #d97706;
    --fail:      #dc2626;
    --pass-bg:   rgba(22,163,74,.08);
    --warn-bg:   rgba(217,119,6,.08);
    --fail-bg:   rgba(220,38,38,.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ── Layout ──────────────────────────────────────────────── */
  .app {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto 1fr;
    height: 100vh;
    overflow: hidden;
  }

  header {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 34px; height: 34px;
    background: linear-gradient(135deg, var(--accent), #a78bfa);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }

  .logo-text {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }

  .logo-sub {
    font-size: 11px;
    color: var(--text3);
    font-weight: 400;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .header-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .api-key-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 6px 10px;
  }

  .api-key-wrap label {
    font-size: 11px;
    color: var(--text3);
    white-space: nowrap;
  }

  .api-key-wrap input {
    background: none;
    border: none;
    outline: none;
    color: var(--text2);
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    width: 200px;
  }

  /* ── Left pane: Input ────────────────────────────────────── */
  .pane {
    overflow-y: auto;
    padding: 24px;
  }

  .pane-left { border-right: 1px solid var(--border); }

  .pane-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 16px;
  }

  .field-group { margin-bottom: 20px; }

  .field-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text2);
    margin-bottom: 8px;
    display: block;
  }

  select, textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-size: 13px;
    font-family: inherit;
    padding: 10px 12px;
    outline: none;
    transition: border-color 0.15s;
  }

  select:focus, textarea:focus {
    border-color: var(--accent);
  }

  textarea {
    resize: vertical;
    min-height: 360px;
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
    font-size: 12px;
    line-height: 1.7;
  }

  .drag-zone {
    border: 1.5px dashed var(--border2);
    border-radius: var(--radius);
    padding: 20px;
    text-align: center;
    color: var(--text3);
    font-size: 12px;
    cursor: pointer;
    margin-bottom: 16px;
    transition: border-color 0.15s, background 0.15s;
  }

  .drag-zone:hover, .drag-zone.drag-over {
    border-color: var(--accent);
    background: rgba(108,99,255,.06);
  }

  .drag-zone .icon { font-size: 24px; margin-bottom: 6px; }

  /* Red-flag chips */
  .flag-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 10px;
  }

  .flag {
    display: flex;
    align-items: center;
    gap: 5px;
    background: var(--fail-bg);
    border: 1px solid rgba(239,68,68,.3);
    color: var(--fail);
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 11px;
    font-weight: 500;
  }

  /* Evaluate button */
  .btn-evaluate {
    width: 100%;
    padding: 13px;
    background: linear-gradient(135deg, var(--accent), #7c3aed);
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    letter-spacing: 0.2px;
    transition: opacity 0.15s, transform 0.1s;
  }

  .btn-evaluate:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
  .btn-evaluate:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

  /* ── Right pane: Results ─────────────────────────────────── */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text3);
    text-align: center;
    gap: 10px;
  }

  .empty-icon { font-size: 48px; opacity: 0.4; }

  .loading-state {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 16px;
    color: var(--text2);
  }

  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Verdict card */
  .verdict-card {
    border-radius: var(--radius);
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 24px;
  }

  .verdict-card.PASS { background: var(--pass-bg); border: 1px solid rgba(34,197,94,.3); }
  .verdict-card.WARN { background: var(--warn-bg); border: 1px solid rgba(245,158,11,.3); }
  .verdict-card.FAIL { background: var(--fail-bg); border: 1px solid rgba(239,68,68,.3); }

  .verdict-badge {
    font-size: 28px;
    font-weight: 900;
    letter-spacing: 2px;
    min-width: 80px;
    text-align: center;
  }

  .verdict-card.PASS .verdict-badge { color: var(--pass); }
  .verdict-card.WARN .verdict-badge { color: var(--warn); }
  .verdict-card.FAIL .verdict-badge { color: var(--fail); }

  .verdict-score {
    font-size: 42px;
    font-weight: 800;
    line-height: 1;
  }

  .verdict-card.PASS .verdict-score { color: var(--pass); }
  .verdict-card.WARN .verdict-score { color: var(--warn); }
  .verdict-card.FAIL .verdict-score { color: var(--fail); }

  .verdict-meta { flex: 1; }
  .verdict-type { font-size: 12px; color: var(--text3); margin-bottom: 4px; }
  .verdict-label { font-size: 16px; font-weight: 700; }

  /* Dimension bars */
  .section-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 14px;
  }

  .dim-row {
    display: grid;
    grid-template-columns: 160px 1fr 38px;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }

  .dim-name {
    font-size: 12px;
    font-weight: 500;
    color: var(--text2);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .bar-track {
    height: 7px;
    background: var(--surface2);
    border-radius: 4px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.6s cubic-bezier(.4,0,.2,1);
  }

  .bar-fill.high   { background: var(--pass); }
  .bar-fill.medium { background: var(--warn); }
  .bar-fill.low    { background: var(--fail); }

  .dim-score {
    font-size: 12px;
    font-weight: 700;
    text-align: right;
  }

  .dim-notes {
    grid-column: 2 / -1;
    font-size: 12px;
    color: var(--text2);
    margin-top: -8px;
    margin-bottom: 6px;
    padding-left: 0;
    line-height: 1.6;
  }

  /* Issues list */
  .issue-item {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    padding: 10px 14px;
    background: var(--surface2);
    border-radius: var(--radius-sm);
    border-left: 3px solid var(--fail);
    margin-bottom: 8px;
    font-size: 12px;
    line-height: 1.5;
  }

  .issue-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }

  /* Improvement prompt box */
  .improvement-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-top: 4px;
  }

  .improvement-text {
    font-size: 12px;
    color: var(--text2);
    line-height: 1.7;
    font-style: italic;
    white-space: pre-wrap;
  }

  .copy-btn {
    margin-top: 12px;
    padding: 7px 14px;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    color: var(--text2);
    font-size: 12px;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }

  .copy-btn:hover { border-color: var(--accent); color: var(--accent2); }

  /* Sections */
  .result-section { margin-bottom: 28px; }

  /* Red flag banner in input */
  .flag-banner {
    background: var(--fail-bg);
    border: 1px solid rgba(239,68,68,.25);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    margin-bottom: 16px;
    display: none;
  }

  .flag-banner-title {
    font-size: 11px;
    font-weight: 700;
    color: var(--fail);
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  /* Responsive */
  @media (max-width: 768px) {
    .app { grid-template-columns: 1fr; grid-template-rows: auto auto 1fr; }
    .pane-left { border-right: none; border-bottom: 1px solid var(--border); }
  }
</style>
</head>
<body>

<div class="app">

  <!-- HEADER -->
  <header>
    <div class="logo">
      <div class="logo-icon">🔬</div>
      <div>
        <div style="display:flex;align-items:center;gap:6px;">
          <div class="logo-text">AmbitQA Evaluator</div>
          <span style="font-size:0.7rem;font-family:monospace;color:var(--text3);background:var(--surface2);border:1px solid var(--border);border-radius:999px;padding:2px 8px;font-weight:600;">v1.3.1</span>
        </div>
        <div class="logo-sub">AI Output Quality Scoring Engine</div>
      </div>
    </div>
    <div class="header-right">
      <button id="themeToggle" onclick="toggleTheme()" title="Toggle light/dark mode" style="
        background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
        width: 34px; height: 34px; cursor: pointer; font-size: 16px;
        display: flex; align-items: center; justify-content: center;
        color: var(--text2); transition: background 0.15s;
      ">☀️</button>
      <div class="api-key-wrap">
        <label>API Key</label>
        <input type="password" id="apiKey" placeholder="sk-ant-..." autocomplete="off">
      </div>
    </div>
  </header>

  <!-- LEFT: INPUT PANE -->
  <div class="pane pane-left">
    <div class="pane-title">Artifact Input</div>

    <!-- Type selector -->
    <div class="field-group">
      <label class="field-label">Deliverable Type</label>
      <select id="artifactType">
        <option value="auto">Auto-detect</option>
        <option value="test_plan">Test Plan</option>
        <option value="test_cases">Test Cases</option>
        <option value="bdd_gherkin">BDD / Gherkin Scenarios</option>
        <option value="bug_report">Bug Report</option>
        <option value="automation_code">Automation Code</option>
        <option value="api_test_cases">API Test Cases</option>
        <option value="security_test_cases">Security Test Cases</option>
        <option value="performance_test_cases">Performance Test Plan / Script</option>
        <option value="traceability_matrix">Requirements Traceability Matrix</option>
        <option value="test_execution_report">Test Execution Report</option>
        <option value="exit_criteria">Exit Criteria / DoD</option>
        <option value="lessons_learned">Lessons Learned</option>
      </select>
    </div>

    <!-- Drag zone -->
    <div class="drag-zone" id="dragZone">
      <div class="icon">📋</div>
      <div>Drop a <strong>.txt</strong> or <strong>.md</strong> file here, or paste below</div>
    </div>

    <!-- Red-flag banner -->
    <div class="flag-banner" id="flagBanner">
      <div class="flag-banner-title">⚠️ Pre-scan flags detected</div>
      <div class="flag-list" id="flagList"></div>
    </div>

    <!-- Artifact textarea -->
    <div class="field-group">
      <label class="field-label">QA Artifact Text</label>
      <textarea id="artifactText" placeholder="Paste the QA artifact generated by AmbitQA here…"></textarea>
    </div>

    <button class="btn-evaluate" id="evaluateBtn" onclick="runEvaluation()">
      Evaluate Artifact
    </button>
  </div>

  <!-- RIGHT: RESULTS PANE -->
  <div class="pane pane-right" id="resultsPane">

    <div class="empty-state" id="emptyState">
      <div class="empty-icon">🎯</div>
      <div style="font-size:15px;font-weight:600;color:var(--text2)">No evaluation yet</div>
      <div style="font-size:12px;max-width:240px">Paste a QA artifact on the left and click Evaluate to score it against ISTQB/IEEE 829 rubrics.</div>
    </div>

    <div class="loading-state" id="loadingState">
      <div class="spinner"></div>
      <div style="font-size:13px">Evaluating artifact…</div>
    </div>

    <div id="resultsContent" style="display:none">
      <!-- Results injected here -->
    </div>

  </div>

</div>

<script>
// ── Version ──────────────────────────────────────────────────────────────────
const AMBIT_QA_VERSION = 'v1.3.1'; // bump this before each deploy

// ── Rubrics (embedded) ─────────────────────────────────────────────────────
const RUBRICS = {
  test_plan: {
    label: "Test Plan",
    keywords: ["test plan","test strategy","testing scope","entry criteria","exit criteria","scope","test deliverables","risk"],
    dimensions: {
      completeness:      { weight: 0.25, description: "All IEEE 829 required sections present (Objectives, Scope, Out-of-Scope, Approach, Entry/Exit Criteria, Deliverables, Risks, Schedule, Resources)" },
      specificity:       { weight: 0.20, description: "Scope, objectives, and criteria are concrete with named features, environments, and measurable thresholds" },
      risk_coverage:     { weight: 0.20, description: "3+ risks each with likelihood rating, impact rating, and concrete mitigation strategy" },
      executability:     { weight: 0.20, description: "Entry/exit criteria are binary pass/fail with no interpretation required" },
      format_compliance: { weight: 0.15, description: "IEEE 829 structure with clear headers, version history, document ID, approval fields" }
    }
  },
  test_cases: {
    label: "Test Cases",
    keywords: ["test case","test id","test step","expected result","precondition","tc-","priority","test type"],
    dimensions: {
      completeness:  { weight: 0.20, description: "Every case has: Test ID, Title, Preconditions, Steps, Expected Result, Priority, Test Type (positive/negative/edge)" },
      specificity:   { weight: 0.25, description: "Steps name exact UI element, value, and action — not 'click the button' or 'fill in the form'" },
      coverage:      { weight: 0.25, description: "Positive, negative, boundary, and error-handling cases all represented" },
      executability: { weight: 0.20, description: "A new tester can execute with zero questions; no domain knowledge assumed" },
      traceability:  { weight: 0.10, description: "Each case links to a requirement ID or acceptance criterion" }
    }
  },
  bdd_gherkin: {
    label: "BDD / Gherkin Scenarios",
    keywords: ["feature:","scenario:","given","when","then","scenario outline","examples:","background:"],
    dimensions: {
      gherkin_syntax:    { weight: 0.25, description: "Valid Feature/Scenario/Given/When/Then/And structure with no double Given/When, missing Then, etc." },
      declarative_style: { weight: 0.20, description: "Steps describe behavior, not UI actions ('the user is authenticated' not 'I click Login')" },
      coverage:          { weight: 0.25, description: "Happy path + at least 2 alternate/error scenario flows" },
      specificity:       { weight: 0.20, description: "Real or realistic data values in steps (emails, amounts, usernames) — not placeholders" },
      format_compliance: { weight: 0.10, description: "Feature keyword, tags, Background where applicable, proper indentation" }
    }
  },
  bug_report: {
    label: "Bug Report",
    keywords: ["bug","defect","issue","severity","priority","steps to reproduce","expected behavior","actual behavior","environment","repro"],
    dimensions: {
      completeness:       { weight: 0.25, description: "All 8 fields present: Title, Severity, Priority, Environment, Steps to Reproduce, Expected Result, Actual Result, Attachments note" },
      reproducibility:    { weight: 0.30, description: "Numbered steps from precondition to exact trigger; zero assumptions required" },
      expected_vs_actual: { weight: 0.25, description: "Expected and actual are specific, concrete, and directly contrast each other" },
      severity_rationale: { weight: 0.10, description: "Severity and priority values are appropriate with 1-sentence justification each" },
      format_compliance:  { weight: 0.10, description: "Jira-ready structure with all metadata; could be filed as-is" }
    }
  },
  automation_code: {
    label: "Automation Code",
    keywords: ["playwright","selenium","cypress","cucumber","pytest","describe(","test(","it(","def test_","import","expect(","assert","page.","driver."],
    dimensions: {
      executability:       { weight: 0.30, description: "Runnable with standard install; no TODOs, FIXMEs, hardcoded waits, or placeholder selectors" },
      selector_quality:    { weight: 0.25, description: "data-testid or role-based selectors; inferred selectors labeled as 'inferred — verify before running'" },
      assertions:          { weight: 0.20, description: "Meaningful assertions on content, state, URL, or API response — not just visibility" },
      framework_conventions: { weight: 0.15, description: "Page Object pattern, proper hooks (beforeEach/afterEach), no test interdependencies" },
      honesty_labeling:    { weight: 0.10, description: "All inferred/guessed selectors explicitly labeled; assumptions surfaced as comments" }
    }
  },
  traceability_matrix: {
    label: "Requirements Traceability Matrix",
    keywords: ["traceability","rtm","requirement","test case id","coverage","mapped","traced","req id"],
    dimensions: {
      completeness:    { weight: 0.30, description: "Every requirement row has ≥1 test case mapped" },
      coverage_type:   { weight: 0.25, description: "Each requirement has minimum positive + negative test case" },
      format_compliance: { weight: 0.25, description: "Standard table with: Req ID, Description, Test Case ID(s), Test Status, Priority" },
      bidirectionality: { weight: 0.20, description: "Traceable both req→test and test→req; test IDs match actual case IDs" }
    }
  },
  test_execution_report: {
    label: "Test Execution Report",
    keywords: ["execution report","test run","pass rate","failed tests","blocked","defects found","test cycle","total executed","pass count","fail count"],
    dimensions: {
      completeness:    { weight: 0.25, description: "All sections present: Executive Summary, Cycle Info, Pass/Fail Counts, Defects Found, Blocked Cases, Environment, Recommendation" },
      metrics_accuracy: { weight: 0.30, description: "Pass+Fail+Blocked = Total; pass rate % is correct; defect count matches the defect list" },
      recommendation:  { weight: 0.25, description: "Explicit Go/No-Go with reference to exit criteria and open defect risk" },
      defect_detail:   { weight: 0.20, description: "Each defect listed with ID, title, severity, blocker status, and resolution" }
    }
  },
  exit_criteria: {
    label: "Exit Criteria / Definition of Done",
    keywords: ["exit criteria","definition of done","release criteria","done when","acceptance criteria","quality gate","pass rate","defect threshold"],
    dimensions: {
      measurability: { weight: 0.40, description: "Every criterion is a specific metric with threshold (e.g. '≥95% test cases pass') — no 'all major bugs' or 'sufficient testing'" },
      completeness:  { weight: 0.30, description: "Covers test execution, defect severity thresholds, code coverage, and performance criteria" },
      traceability:  { weight: 0.30, description: "Each criterion traces to a test plan objective or specific requirement" }
    }
  },
  lessons_learned: {
    label: "Lessons Learned / Retrospective",
    keywords: ["lessons learned","retrospective","what went well","what to improve","action items","root cause","process improvement"],
    dimensions: {
      balance:          { weight: 0.25, description: "Substantive content in both what-went-well and what-to-improve sections" },
      specificity:      { weight: 0.30, description: "Lessons cite specific project incidents and root causes — not platitudes like 'communicate more'" },
      action_items:     { weight: 0.30, description: "Each improvement has an assigned owner and target completion date" },
      format_compliance: { weight: 0.15, description: "Project info header, structured sections, action item table" }
    }
  },
  api_test_cases: {
    label: "API Test Cases",
    keywords: ["api","endpoint","rest","graphql","http","status code","response body","request","payload","postman","curl","jwt","oauth","bearer","content-type","authorization"],
    dimensions: {
      completeness:    { weight: 0.25, description: "Each test has: Endpoint, Method, Headers, Request Body, Expected Status Code, Expected Response Schema, Test Type (positive/negative/auth)" },
      coverage:        { weight: 0.25, description: "Covers: success paths, error codes (400/401/403/404/500), auth failures, invalid payloads, boundary values, and edge cases" },
      specificity:     { weight: 0.25, description: "Exact endpoints, sample payloads, expected JSON fields, and status codes — not 'verify the API works'" },
      auth_coverage:   { weight: 0.15, description: "Authentication and authorization scenarios tested — missing/expired/invalid token cases included" },
      executability:   { weight: 0.10, description: "Tests runnable in Postman or code with no missing information; base URL and auth setup documented" }
    }
  },
  security_test_cases: {
    label: "Security Test Cases",
    keywords: ["owasp","xss","sql injection","csrf","idor","injection","authentication","session","vulnerability","security","penetration","attack","payload","malicious","unauthorized"],
    dimensions: {
      owasp_coverage:  { weight: 0.30, description: "Addresses relevant OWASP Top 10 categories for the application type (injection, broken auth, XSS, IDOR, misconfig, etc.)" },
      attack_specificity: { weight: 0.25, description: "Actual attack vectors/payloads provided (e.g. XSS: &lt;script&gt;alert(1)&lt;/script&gt;, SQLi: ' OR 1=1--, Path traversal: ../../../etc/passwd) — not generic descriptions" },
      completeness:    { weight: 0.20, description: "Each test has: Vulnerability type, Attack vector, Steps to reproduce, Expected behavior (blocked/sanitized), Severity rating" },
      boundary_testing: { weight: 0.15, description: "Tests cover all input surfaces: forms, URL params, headers, cookies, API payloads, file uploads" },
      remediation:     { weight: 0.10, description: "Each test includes expected secure behavior or links to remediation guidance" }
    }
  },
  performance_test_cases: {
    label: "Performance Test Plan / Script",
    keywords: ["load test","stress test","spike test","soak test","performance","throughput","latency","response time","concurrent users","k6","jmeter","ramp up","ramp down","vus","think time","percentile","p95","p99","tps","rps"],
    dimensions: {
      scenario_coverage: { weight: 0.25, description: "Covers all required scenario types: load (normal), stress (beyond capacity), spike (sudden burst), soak (sustained duration)" },
      thresholds:        { weight: 0.25, description: "Specific SLA thresholds defined: max response time (p95/p99), error rate %, min throughput (RPS/TPS)" },
      script_quality:    { weight: 0.25, description: "Runnable script (k6/JMeter/etc.) with realistic think times, ramp-up/ramp-down, and parameterized data" },
      completeness:      { weight: 0.15, description: "Test plan includes: target environment, test duration, virtual users, endpoints under test, monitoring approach" },
      reporting:         { weight: 0.10, description: "Expected output metrics defined: latency percentiles, error rate, throughput graphs" }
    }
  }
};

// ── Red-flag patterns ──────────────────────────────────────────────────────
const RED_FLAGS = [
  { pattern: /\bclick the button\b/i,           issue: "Vague step — no selector or element label specified" },
  { pattern: /\bfill in the form\b/i,           issue: "Vague step — no field names or values specified" },
  { pattern: /\bnavigate to (?:the )?page\b/i,  issue: "Vague step — no URL or page name" },
  { pattern: /\bverify it works\b/i,            issue: "Untestable assertion — no expected outcome" },
  { pattern: /\bTODO\b/,                        issue: "Unresolved TODO placeholder in output" },
  { pattern: /\bFIXME\b/,                       issue: "FIXME marker — output incomplete" },
  { pattern: /YOUR_SELECTOR_HERE/i,             issue: "Placeholder selector — not a real locator" },
  { pattern: /time\.sleep\(\d+\)/,              issue: "Hardcoded sleep — use explicit waits instead" },
  { pattern: /waitForTimeout\(\d{4,}\)/,        issue: "Long hardcoded timeout — use auto-wait or locator-based wait" },
  { pattern: /all major bugs/i,                 issue: "Unmeasurable exit criterion — specify severity thresholds" },
  { pattern: /sufficient testing/i,             issue: "Vague exit criterion — specify coverage percentages" },
  { pattern: /stakeholder satisfaction/i,       issue: "Subjective criterion — replace with measurable metric" },
  { pattern: /(?:Given|When|Then)[^\n]*\n\s*(?:Given|When|Then)[^\n]*\n\s*(?:Given|When)/i, issue: "Possible duplicate Gherkin keyword sequence" },
  { pattern: /communication is important/i,     issue: "Platitude in lessons learned — needs specific incident" },
  { pattern: /test earlier next time/i,         issue: "Generic lesson — cite a specific event and root cause" },
  // API testing red flags
  { pattern: /verify the api works/i,           issue: "Vague API assertion — specify status code and response fields" },
  { pattern: /check the response/i,             issue: "Vague assertion — specify exact field names and expected values" },
  { pattern: /YOUR_API_KEY/i,                   issue: "Placeholder API key — replace with parameterized variable" },
  { pattern: /http:\/\/localhost/i,             issue: "Hardcoded localhost URL — use environment variable" },
  { pattern: /status.*200.*only/i,              issue: "Only testing 200 — add negative cases (400, 401, 403, 404, 500)" },
  // Security testing red flags
  { pattern: /test for xss/i,                  issue: "Vague XSS test — provide actual payload (e.g. &lt;script&gt;alert(1)&lt;/script&gt; or onerror=alert(1))" },
  { pattern: /test for sql injection/i,         issue: "Vague SQL injection test — provide actual payload (e.g. ' OR 1=1--)" },
  { pattern: /check for vulnerabilities/i,      issue: "Too generic — specify which OWASP Top 10 category and attack vector" },
  { pattern: /run a security scan/i,            issue: "Vague — specify tool (Burp Suite, ZAP), scope, and what to look for" },
  // Performance testing red flags
  { pattern: /time\.sleep\(\d+\)/,             issue: "Hardcoded sleep — use think time or pacing functions" },
  { pattern: /test with many users/i,           issue: "Vague load — specify exact virtual user count and ramp-up profile" },
  { pattern: /performance should be good/i,     issue: "Unmeasurable threshold — specify p95/p99 response time and error rate %" },
  { pattern: /no (?:p95|p99|percentile|sla|threshold)/i, issue: "Missing SLA thresholds — define max response time and error rate" },
];

// ── Type detection ─────────────────────────────────────────────────────────
function detectType(text) {
  const lower = text.toLowerCase();
  let best = null, bestScore = 0;
  for (const [key, rubric] of Object.entries(RUBRICS)) {
    const score = rubric.keywords.filter(k => lower.includes(k)).length;
    if (score > bestScore) { bestScore = score; best = key; }
  }
  return best || 'test_cases';
}

// ── Red-flag scan ──────────────────────────────────────────────────────────
function scanRedFlags(text) {
  return RED_FLAGS.filter(f => f.pattern.test(text));
}

// ── Live red-flag scan on input ────────────────────────────────────────────
document.getElementById('artifactText').addEventListener('input', function() {
  const flags = scanRedFlags(this.value);
  const banner = document.getElementById('flagBanner');
  const list   = document.getElementById('flagList');
  if (flags.length) {
    banner.style.display = 'block';
    list.innerHTML = flags.map(f => `<span class="flag">⚠ ${f.issue}</span>`).join('');
  } else {
    banner.style.display = 'none';
    list.innerHTML = '';
  }
});

// ── Drag & drop ────────────────────────────────────────────────────────────
const dz = document.getElementById('dragZone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
dz.addEventListener('drop', e => {
  e.preventDefault();
  dz.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = ev => { document.getElementById('artifactText').value = ev.target.result; document.getElementById('artifactText').dispatchEvent(new Event('input')); };
    reader.readAsText(file);
  }
});

// ── Build evaluator system prompt ─────────────────────────────────────────
function buildSystemPrompt(rubric) {
  const dims = Object.entries(rubric.dimensions).map(([k, v]) =>
    `- ${k} (weight ${v.weight}): ${v.description}`).join('\n');

  return `You are a senior QA evaluator trained in ISTQB Foundation Level and IEEE 829 standards. You evaluate QA artifacts with rigorous, consistent scoring.

You will receive a QA artifact of type "${rubric.label}". Score each dimension from 0 to 10 using the descriptions below, then compute a weighted total (0-100).

SCORING DIMENSIONS:
${dims}

VERDICT THRESHOLDS:
- PASS: weighted_total >= 75
- WARN: weighted_total 50-74
- FAIL: weighted_total < 50

RULES:
1. Be strict. A score of 10 requires near-perfect execution. 7-8 is good. 5-6 is mediocre.
2. If a required section or field is missing, cap that dimension at 4.
3. Vague language ("click the button", "verify it works", "all major bugs") caps specificity/executability at 3.
4. For automation_code: presence of TODO, FIXME, hardcoded waits, or unverified selectors not labeled as inferred caps executability at 5.
5. Inferred selectors presented as confirmed in automation code caps honesty_labeling at 2.
6. The improvement_prompt must be an EXACT prompt the user can paste back into AmbitQA to fix the top weaknesses. Be specific about which sections need work and what to add. Format it as an imperative instruction to the AI.

Return ONLY a valid JSON object — no markdown fences, no preamble, no explanation. Exact shape required:

{
  "artifact_type": "string",
  "scores": {
    "<dimension_key>": {
      "score": <0-10>,
      "notes": "one concise sentence explaining the score"
    }
  },
  "weighted_total": <0-100, 1 decimal>,
  "verdict": "PASS" | "WARN" | "FAIL",
  "top_issues": ["issue 1", "issue 2", "issue 3"],
  "improvement_prompt": "The exact follow-up prompt to paste into AmbitQA to improve this artifact"
}`;
}

// ── Main evaluation ────────────────────────────────────────────────────────
async function runEvaluation() {
  // Strip non-ASCII characters that cause "non ISO-8859-1 code point" fetch header error
  const apiKey = document.getElementById('apiKey').value
    .trim()
    .replace(/[^\x20-\x7E]/g, '');
  const text   = document.getElementById('artifactText').value.trim();
  const typeEl = document.getElementById('artifactType');
  let   type   = typeEl.value;

  if (!apiKey) { alert('Please enter your Anthropic API key (sk-ant-…).'); return; }
  if (!apiKey.startsWith('sk-')) { alert('API key looks wrong — it should start with sk-ant-…\n\nCheck for stray characters or spaces.'); return; }
  if (!text)   { alert('Please paste a QA artifact to evaluate.'); return; }

  if (type === 'auto') type = detectType(text);
  const rubric = RUBRICS[type];

  // UI: loading
  document.getElementById('emptyState').style.display   = 'none';
  document.getElementById('resultsContent').style.display = 'none';
  document.getElementById('loadingState').style.display  = 'flex';
  document.getElementById('evaluateBtn').disabled = true;

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1500,
        system: buildSystemPrompt(rubric),
        messages: [{ role: 'user', content: `ARTIFACT TYPE: ${rubric.label}\n\nARTIFACT:\n${text}` }]
      })
    });

    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err?.error?.message || `HTTP ${resp.status}`);
    }

    const data = await resp.json();
    const raw  = data.content.map(b => b.text || '').join('');
    const clean = raw.replace(/```json|```/g, '').trim();
    const result = JSON.parse(clean);

    renderResults(result, rubric, type);

  } catch (err) {
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('resultsContent').style.display = 'block';
    document.getElementById('resultsContent').innerHTML = `
      <div style="padding:24px;color:var(--fail);background:var(--fail-bg);border-radius:var(--radius);border:1px solid rgba(239,68,68,.3)">
        <strong>Evaluation failed</strong><br>
        <span style="font-size:12px;color:var(--text2)">${err.message}</span>
      </div>`;
  } finally {
    document.getElementById('evaluateBtn').disabled = false;
    document.getElementById('loadingState').style.display = 'none';
  }
}

// ── Render results ─────────────────────────────────────────────────────────
function renderResults(result, rubric, type) {
  const v = result.verdict;
  const score = result.weighted_total;
  const verdictEmoji = { PASS: '✅', WARN: '⚠️', FAIL: '❌' }[v];

  // Build dimension rows
  const dimRows = Object.entries(result.scores).map(([key, val]) => {
    const w    = rubric.dimensions[key]?.weight || 0;
    const pct  = (val.score / 10) * 100;
    const cls  = val.score >= 7 ? 'high' : val.score >= 5 ? 'medium' : 'low';
    const name = key.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
    const weightPct = Math.round(w * 100);
    return `
      <div class="dim-row">
        <div class="dim-name" title="${rubric.dimensions[key]?.description || ''}">${name} <span style="color:var(--text3);font-size:10px">${weightPct}%</span></div>
        <div class="bar-track"><div class="bar-fill ${cls}" style="width:${pct}%"></div></div>
        <div class="dim-score" style="color:${cls==='high'?'var(--pass)':cls==='medium'?'var(--warn)':'var(--fail)'}">${val.score}/10</div>
        <div></div>
        <div class="dim-notes" style="grid-column:2/-1">${val.notes}</div>
      </div>`;
  }).join('');

  // Issues
  const issues = (result.top_issues || []).map(i => `
    <div class="issue-item">
      <span class="issue-icon">⚡</span>
      <span>${i}</span>
    </div>`).join('');

  const html = `
    <!-- Verdict card -->
    <div class="result-section">
      <div class="verdict-card ${v}">
        <div class="verdict-badge">${v}</div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:2px">
          <div class="verdict-score">${score}</div>
          <div style="font-size:10px;color:var(--text3)">/ 100</div>
        </div>
        <div class="verdict-meta">
          <div class="verdict-type">${rubric.label}</div>
          <div class="verdict-label">${verdictEmoji} ${v === 'PASS' ? 'Meets quality threshold' : v === 'WARN' ? 'Needs improvement before use' : 'Regenerate recommended'}</div>
          <div style="font-size:11px;color:var(--text3);margin-top:4px">Threshold: PASS ≥75 · WARN 50-74 · FAIL &lt;50</div>
        </div>
      </div>
    </div>

    <!-- Dimension scores -->
    <div class="result-section">
      <div class="section-title">Dimension Breakdown</div>
      ${dimRows}
    </div>

    <!-- Top issues -->
    ${issues ? `
    <div class="result-section">
      <div class="section-title">Top Issues to Address</div>
      ${issues}
    </div>` : ''}

    <!-- Improvement prompt -->
    <div class="result-section">
      <div class="section-title">Improvement Prompt — paste into AmbitQA</div>
      <div class="improvement-box">
        <div class="improvement-text" id="improvementText">${escHtml(result.improvement_prompt || 'No improvement needed.')}</div>
        <button class="copy-btn" onclick="copyImprovement()">📋 Copy prompt</button>
      </div>
    </div>
  `;

  document.getElementById('resultsContent').innerHTML = html;
  document.getElementById('resultsContent').style.display = 'block';

  // Animate bars
  requestAnimationFrame(() => {
    document.querySelectorAll('.bar-fill').forEach(el => {
      const w = el.style.width;
      el.style.width = '0';
      requestAnimationFrame(() => { el.style.width = w; });
    });
  });
}

function copyImprovement() {
  const txt = document.getElementById('improvementText')?.innerText || '';
  navigator.clipboard.writeText(txt).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = '✓ Copied!';
    setTimeout(() => btn.textContent = '📋 Copy prompt', 1800);
  });
}

function escHtml(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Theme toggle ──────────────────────────────────────────────────────────
function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') !== 'light';
  html.setAttribute('data-theme', isDark ? 'light' : 'dark');
  document.getElementById('themeToggle').textContent = isDark ? '🌙' : '☀️';
  localStorage.setItem('ambitqa-eval-theme', isDark ? 'light' : 'dark');
}

// Apply saved theme on load
(function() {
  const saved = localStorage.getItem('ambitqa-eval-theme') ||
    (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
  document.documentElement.setAttribute('data-theme', saved);
  // Button text set after DOM ready
  window.addEventListener('DOMContentLoaded', () => {
    const btn = document.getElementById('themeToggle');
    if (btn) btn.textContent = saved === 'light' ? '🌙' : '☀️';
  });
})();

// ── Pre-fill from AmbitQA chatbot (via sessionStorage) ───────────────────
window.addEventListener('load', () => {
  // Restore API key from evaluator's own localStorage (persists across evaluations)
  const savedKey = localStorage.getItem('ambitqa-evaluator-key') || '';
  if (savedKey) {
    document.getElementById('apiKey').value = savedKey;
  }

  const artifact = sessionStorage.getItem('ambitqa_eval_artifact');
  if (artifact) {
    sessionStorage.removeItem('ambitqa_eval_artifact'); // consume once; don't re-fill on refresh
    const ta = document.getElementById('artifactText');
    ta.value = artifact;
    ta.dispatchEvent(new Event('input')); // trigger red-flag scan
    // Auto-detect and set the type dropdown
    const detected = detectType(artifact);
    const sel = document.getElementById('artifactType');
    sel.value = detected;
  }
});

// Persist key to localStorage when user enters/changes it
document.getElementById('apiKey').addEventListener('change', function() {
  const clean = this.value.trim().replace(/[^\x20-\x7E]/g, '');
  this.value = clean;
  if (clean) localStorage.setItem('ambitqa-evaluator-key', clean);
});

// ── Keyboard shortcut: Ctrl+Enter ─────────────────────────────────────────
document.getElementById('artifactText').addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') runEvaluation();
});
</script>
